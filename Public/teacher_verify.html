<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Verification - PNHS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/teacher_verify.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="css/logo1.png" alt="logo" class="logo">
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back</span>
            <button class="btn-logout-top" id="logoutBtn">LOG OUT <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="table-header">
                <div class="header-row">
                    <div class="header-title-group">
                        <h2><i class="fas fa-user-check"></i> Verify Student Reports</h2>
                    </div>
                    <div class="filter-row">
                        <div class="date-picker">
                            <input type="date" id="selectedDate">
                        </div>
                        <button id="refreshBtn" class="btn-refresh">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="verify-table">
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Student</th>
                            <th>Class</th>
                            <th>Reported Status</th>
                            <th>Excuse/Notes</th>
                            <th>Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingList">
                        <tr>
                            <td colspan="7" class="loading-cell">Loading pending reports...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span id="reportCount">Showing 0 pending reports</span>
            </div>
        </main>
    </div>

    <nav class="bottom-nav-container">
        <div class="bottom-nav-bar">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i><span>Dashboard</span>
            </a>
            <a href="students.html" class="nav-item">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Students</span>
            </a>
            <a href="attendance.html" class="nav-item">
                <i class="fas fa-clipboard-check"></i><span>Attendance</span>
            </a>
            <a href="teacher_verify.html" class="nav-item active">
                <i class="fas fa-clipboard-check"></i>
                <span>Verify Attendance</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i><span>Reports</span>
            </a>
            <a href="enroll.html" class="nav-item">
                <i class="fas fa-user-plus"></i>
                <span>Enroll</span>
            </a>
        </div>
    </nav>

    <div class="modal" id="rejectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Reject & Update Status</h3>
                <button class="modal-close" onclick="closeRejectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="rejectStudentName" class="student-name-modal"></p>
                
                <div class="form-group">
                    <label>Change Status To:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="newStatus" value="present" checked>
                            <span class="radio-btn present">PRESENT</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="newStatus" value="absent">
                            <span class="radio-btn absent">ABSENT</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Reason/Notes:</label>
                    <textarea id="rejectNotes" rows="3" placeholder="Enter reason for change..."></textarea>
                </div>
                
                <button class="btn-save-reject" onclick="submitReject()">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/teacher_verify.js"></script>
</body>
</html>
