<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PNHS Student Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <div class="header-logo">
                <img src="css/logo1.png" alt="logo" class="logo">
            </div>
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back, admin</span>
            <button class="btn-logout-top" id="logoutBtn">  LOG OUT <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="dashboard">

<nav class="bottom-nav-container">
    <div class="bottom-nav-bar">
        <a href="dashboard.html" class="nav-item active">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </a>
        <a href="students.html" class="nav-item">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Students</span>
        </a>
        <a href="attendance.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Attendance</span>
        </a>
        <a href="teacher_verify.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Verify Attendance</span>
        </a>
        <a href="reports.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Reports</span>
        </a>
        <a href="enroll.html" class="nav-item">
            <i class="fas fa-user-plus"></i>
            <span>Enroll</span>
        </a>
    </div>
</nav>

    <main class="dashboard-container">
        <section class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon bg-green"><i class="fas fa-users"></i></div>
                <div class="metric-data">
                    <h3 class="metric-label">Total Students</h3>
                    <div class="metric-value" id="totalStudents">0</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon bg-lightgreen"><i class="fas fa-check-circle"></i></div>
                <div class="metric-data">
                    <h3 class="metric-label">Present Today</h3>
                    <div class="metric-value" id="presentToday">0</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon bg-orange"><i class="fas fa-clock"></i></div>
                <div class="metric-data">
                    <h3 class="metric-label">Late Today</h3>
                    <div class="metric-value" id="lateToday">0</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon bg-red"><i class="fas fa-times-circle"></i></div>
                <div class="metric-data">
                    <h3 class="metric-label">Absent Today</h3>
                    <div class="metric-value" id="absentToday">0</div>
                </div>
            </div>
        </section>
    </div>

            <div class="recent-activity">
                <h3>Recent Activity</h3>
                <div id="recentList">Loading...</div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
