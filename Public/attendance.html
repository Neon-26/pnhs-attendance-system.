<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - PNHS Student Attendance System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="css/logo1.png" alt="logo" class="logo">
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back</span>
            <button class="btn-logout-top" id="logoutBtn">LOG OUT <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="table-header">
                <div class="header-row">
                    <div class="header-title-group">
                        <h2>Mark Attendance</h2>
                    </div>
                    <div class="filter-row">
                        <div class="class-dropdown">
                            <select id="classFilter">
                                <option value="all">All Classes</option>
                            </select>
                        </div>
                        <span class="selected-class" id="selectedClassLabel">All Classes</span>
                        <div class="divider"></div>
                        <div class="date-picker">
                            <input type="date" id="selectedDate">
                        </div>
                        <button id="markAllPresent" class="btn-mark-all">
                            <i class="fas fa-check-double"></i> Mark All Present
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Class</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList">
                        <tr>
                            <td colspan="5" class="loading-cell">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span id="attendanceCount">Showing 0 students</span>
            </div>
        </main>
    </div>

    <div class="modal" id="statusModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-clipboard-check"></i> Mark Attendance</h3>
                <button class="modal-close" onclick="closeStatusModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="studentName" class="student-name-modal"></p>
                <div class="status-buttons">
                    <button onclick="markAttendance('present')" class="status-btn present">
                        <i class="fas fa-check"></i> PRESENT
                    </button>
                    <button onclick="markAttendance('late')" class="status-btn late">
                        <i class="fas fa-clock"></i> LATE
                    </button>
                    <button onclick="markAttendance('absent')" class="status-btn absent">
                        <i class="fas fa-times"></i> ABSENT
                    </button>
                </div>
            </div>
        </div>
    </div>

<nav class="bottom-nav-container">
    <div class="bottom-nav-bar">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </a>
        <a href="students.html" class="nav-item">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Students</span>
        </a>
        <a href="attendance.html" class="nav-item active">
            <i class="fas fa-clipboard-check"></i>
            <span>Attendance</span>
        </a>
        <a href="teacher_verify.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Verify Attendance</span>
        </a>
        <a href="reports.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Reports</span>
        </a>
        <a href="enroll.html" class="nav-item">
            <i class="fas fa-user-plus"></i>
            <span>Enroll</span>
        </a>
    </div>
</nav>

    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
