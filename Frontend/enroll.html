<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll - PNHS Student Attendance System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/enroll.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="css/logo1.png" alt="logo" class="logo">
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back</span>
            <button class="btn-logout-top" id="logoutBtn">LOG OUT <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="table-header">
                <div class="header-row">
                    <div class="header-title-group">
                        <h2>Enrollment Management</h2>
                    </div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="staff">
                    <i class="fas fa-user-tie"></i> Staff (Admin/Teacher)
                </button>
                <button class="tab-btn" data-tab="student">
                    <i class="fas fa-user-graduate"></i> Students
                </button>
            </div>

            <div class="tab-content active" id="staff-tab">
                <form id="staffForm" class="enroll-form">
                    <h3><i class="fas fa-user-plus"></i> Enroll New Staff</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="staffUsername" required placeholder="Enter username">
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="staffRole" required>
                                <option value="admin">Admin</option>
                                <option value="teacher">Teacher</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="staffPassword" required placeholder="Enter password">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="staffEmail" placeholder="Enter email">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Enroll Staff</button>
                </form>

                <div class="list-section">
                    <h3>Staff List</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffList">
                            <tr><td colspan="5" class="loading-cell">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="student-tab">
                <form id="studentForm" class="enroll-form">
                    <h3><i class="fas fa-user-plus"></i> Enroll New Student</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Student ID</label>
                            <input type="text" id="studentId" required placeholder="e.g., STU011">
                        </div>
                        <div class="form-group">
                            <label>Class</label>
                            <select id="studentClass" required>
                                <option value="Class 10A">Class 10A</option>
                                <option value="Class 10B">Class 10B</option>
                                <option value="Class 11A">Class 11A</option>
                                <option value="Class 11B">Class 11B</option>
                                <option value="Class 12A">Class 12A</option>
                                <option value="Class 12B">Class 12B</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="studentFirstName" required placeholder="First name">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="studentLastName" required placeholder="Last name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Student Email</label>
                            <input type="email" id="studentEmail" placeholder="student@email.com">
                        </div>
                        <div class="form-group">
                            <label>Parent Email</label>
                            <input type="email" id="parentEmail" placeholder="parent@email.com">
                        </div>
                        <div class="form-group">
                            <label>Username (leave blank for auto-generate)</label>
                            <input type="text" id="username" placeholder="e.g., john.doe">
                        </div>
                        <div class="form-group">
                            <label>Password (leave blank for default: user123)</label>
                            <input type="text" id="password" placeholder="Enter custom password">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Enroll Student</button>
                </form>

                <div class="list-section">
                    <h3>Student List</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Account</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentList">
                            <tr><td colspan="6" class="loading-cell">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav-container">
        <div class="bottom-nav-bar">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="students.html" class="nav-item">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Students</span>
            </a>
            <a href="attendance.html" class="nav-item">
                <i class="fas fa-clipboard-check"></i>
                <span>Attendance</span>
            </a>
            <a href="teacher_verify.html" class="nav-item">
                <i class="fas fa-clipboard-check"></i>
                <span>Verify Attendance</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="enroll.html" class="nav-item active">
                <i class="fas fa-user-plus"></i>
                <span>Enroll</span>
            </a>
        </div>
    </nav>

    <script src="js/auth.js"></script>
    <script src="js/enroll.js"></script>
</body>
</html>
