<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - PNHS Student Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/students.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="css/logo1.png" alt="logo" class="logo">
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back</span>
            <button class="btn-logout-top" id="logoutBtn">LOG OUT <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="table-header">
                <div class="header-center">
                    <h2>Students Management</h2>
                    <div class="class-dropdown">
                        <select id="classFilter">
                            <option value="all">All Classes</option>
                        </select>
                    </div>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search students...">
                </div>
            </div>

            <div class="table-wrapper">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Class</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <tr>
                            <td colspan="6" class="loading-cell">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span id="showingCount">Showing 0 students</span>
            </div>
        </main>
    </div>

    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user"></i> Student Details</h3>
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
            </div>
            <div class="modal-body" id="viewModalBody"></div>
        </div>
    </div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Edit Student</h3>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="editStudentForm">
                <input type="hidden" id="editStudentId">
                
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="editStudentIdDisplay" disabled>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLastName" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Class</label>
                    <select id="editClass" required>
                        <option value="Class 10A">Class 10A</option>
                        <option value="Class 10B">Class 10B</option>
                        <option value="Class 11A">Class 11A</option>
                        <option value="Class 11B">Class 11B</option>
                        <option value="Class 12A">Class 12A</option>
                        <option value="Class 12B">Class 12B</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail">
                </div>
                
                <div class="form-group">
                    <label>Parent Email</label>
                    <input type="email" id="editParentEmail">
                </div>
                
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus" required>
                        <option value="active">Active (Enrolled)</option>
                        <option value="inactive">Inactive (Left School)</option>
                    </select>
                </div>
                
                <div class="form-buttons">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<nav class="bottom-nav-container">
    <div class="bottom-nav-bar">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </a>
        <a href="students.html" class="nav-item active">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Students</span>
        </a>
        <a href="attendance.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Attendance</span>
        </a>
        <a href="teacher_verify.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Verify Attendance</span>
        </a>
        <a href="reports.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Reports</span>
        </a>
        <a href="enroll.html" class="nav-item">
            <i class="fas fa-user-plus"></i>
            <span>Enroll</span>
        </a>
    </div>
</nav>

    <script src="js/auth.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
