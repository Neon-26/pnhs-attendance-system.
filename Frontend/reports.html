<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - PNHS Student Attendance System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="icon" href="Css/logo1.png" type="image/x-icon">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="css/logo1.png" alt="logo" class="logo">
            <div class="header-title">
                <h2>PNHS STUDENT</h2>
                <span>ATTENDANCE SYSTEM</span>
            </div>
        </div>
        <div class="header-right">
            <span class="welcome-user" id="userInfo">Welcome Back</span>
            <button class="btn-logout-top" id="logoutBtn">LOG OUT <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="table-header">
                <div class="header-row">
                    <div class="header-title-group">
                        <h2>Attendance Reports</h2>
                    </div>
                    <div class="filter-row">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="studentFilter" placeholder="Search by Student ID...">
                        </div>
                        <div class="class-dropdown">
                            <select id="classFilter">
                                <option value="all">All Classes</option>
                            </select>
                        </div>
                        <span class="selected-class" id="selectedClassLabel">All Classes</span>
                        <div class="divider"></div>
                        <div class="date-picker">
                            <input type="date" id="dateFilter">
                        </div>
                        <button id="generateReport" class="btn-generate">
                            <i class="fas fa-file-alt"></i> Generate Report
                        </button>
                        <button id="exportExcel" class="btn-export">
                            <i class="fas fa-file-excel"></i> Export Excel
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="reports-table">
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Student ID</th>
                            <th>Student Name</th>
                            <th>Class</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr>
                            <td colspan="7" class="loading-cell">Loading reports...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-footer">
                <span id="reportCount">Showing 0 records</span>
            </div>
        </main>
    </div>

<nav class="bottom-nav-container">
    <div class="bottom-nav-bar">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </a>
        <a href="students.html" class="nav-item">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>Students</span>
        </a>
        <a href="attendance.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Attendance</span>
        </a>
        <a href="teacher_verify.html" class="nav-item">
            <i class="fas fa-clipboard-check"></i>
            <span>Verify Attendance</span>
        </a>
        <a href="reports.html" class="nav-item active">
            <i class="fas fa-chart-bar"></i>
            <span>Reports</span>
        </a>
        <a href="enroll.html" class="nav-item">
            <i class="fas fa-user-plus"></i>
            <span>Enroll</span>
        </a>
    </div>
</nav>

    <script src="js/auth.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
